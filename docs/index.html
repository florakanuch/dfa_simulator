<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DFA Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .dfa-btn-purple:hover { background: rgba(124,77,255,0.38) !important; }
        .dfa-btn-teal:hover { background: rgba(38,166,154,0.35) !important; }
        .dfa-btn-red:hover { background: rgba(239,83,80,0.32)  !important; }
        .dfa-btn-primary:hover { opacity: 0.88; }
    </style>
</head>
<body>
    <div id="app"></div>
    <input type="file" id="dfa-file-input" accept=".dfa,.txt" style="display:none" />

    <script src="main.js"></script>
    <script>
    const STORAGE_KEY = 'dfa_simulator_saves_v1';

    var app = Elm.Main.init({ node: document.getElementById('app') });




    (function() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            const data = raw ? JSON.parse(raw) : [];
            app.ports.storageIn.send(data);
        } catch(e) {
            app.ports.storageIn.send([]);
        }
    })();

    

    app.ports.savesToStorage.subscribe(function(data) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
        catch(e) {}
    });

    
    app.ports.sendLanguage.subscribe(function(_lang) {});


    app.ports.downloadFile.subscribe(function(opts) {
        const blob = new Blob([opts.content], { type: 'text/plain' });
        const url  = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = opts.filename;
        a.click();
        URL.revokeObjectURL(url);
    });

    
    
    app.ports.exportSvg.subscribe(function(filename) {
        var svg = document.querySelector('svg');
        if (!svg) return;

        var clone = svg.cloneNode(true);
        clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

        var defs = clone.querySelector('defs') || clone.insertBefore(document.createElementNS('http://www.w3.org/2000/svg', 'defs'), clone.firstChild);
        var style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
        style.textContent = 'text { font-family: monospace, sans-serif; }';
        defs.appendChild(style);

        var bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        var rect = svg.getBoundingClientRect();
        bg.setAttribute('width', rect.width);
        bg.setAttribute('height', rect.height);
        bg.setAttribute('fill', 'white');
        clone.insertBefore(bg, clone.firstChild.nextSibling);

        clone.setAttribute('width', rect.width);
        clone.setAttribute('height', rect.height);
        clone.querySelectorAll('text').forEach(function(el) {
            el.setAttribute('fill', '#111111');
        });

        var svgStr = new XMLSerializer().serializeToString(clone);
        var blob = new Blob([svgStr], { type: 'image/svg+xml' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    });



    app.ports.triggerFileInput.subscribe(function() {
        document.getElementById('dfa-file-input').click();
    });

    document.getElementById('dfa-file-input').addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            app.ports.fileContent.send(e.target.result);
        };
        reader.readAsText(file);
        this.value = '';
    });

    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { /* modals closed by Elm */ }
        const tag = document.activeElement && document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        const ctrl = e.ctrlKey || e.metaKey;
        if (ctrl && !e.shiftKey && e.key.toLowerCase() === 'z') {
            e.preventDefault(); app.ports.keyboardMsg.send('undo');
        } else if (ctrl && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) {
            e.preventDefault(); app.ports.keyboardMsg.send('redo');
        } else if ((e.key === 'Delete' || e.key === 'Backspace') && !ctrl) {
            e.preventDefault(); app.ports.keyboardMsg.send('delete');
        }
    });

    
    (function() {
        function attachFix() {
            var svg = document.querySelector('svg');
            if (!svg) { setTimeout(attachFix, 100); return; }
            ['click','mousedown','mousemove'].forEach(function(evtName) {
                svg.addEventListener(evtName, function(e) {
                    var r = svg.getBoundingClientRect();
                    Object.defineProperty(e, 'offsetX', {get: function(){ return e.clientX-r.left; }, configurable:true});
                    Object.defineProperty(e, 'offsetY', {get: function(){ return e.clientY-r.top;  }, configurable:true});
                }, true);
            });
        }
        attachFix();
    })();
    </script>
</body>
</html>
